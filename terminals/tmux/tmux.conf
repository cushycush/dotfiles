# Prefix
set -g prefix C-f
set -g prefix2 C-b
bind C-f send-prefix

# Set default shell
set -g default-shell /usr/bin/fish
set -g default-command /usr/bin/fish

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
set -s copy-command 'wl-copy'

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# ─────────────────────────────────────────────────────────
# Status bar — AlexvZyl reference (Nord terminal palette)
# ─────────────────────────────────────────────────────────

set -g status-position top
set -g status-justify left
set -g status-interval 1
set -g status on
set -g 'status-format[0]' '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
set -g status-left-length 100
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Base
set -g status-style "fg=yellow,bg=black"

# Left:  [desktop session_windows]
set -g status-left "#[fg=#88C0D0,bg=black]#[fg=black,bg=#88C0D0] #{session_windows}#[fg=#88C0D0,bg=black]  "

# Windows
set -g window-status-style "fg=colour8,bg=black"
set -g window-status-format         "#[fg=default,bg=black] #[fg=default,bg=black]#W"
set -g window-status-current-format "#[fg=#88C0D0,bg=black] #[fg=#88C0D0,bg=black]#W"
set -g window-status-separator      "  "
set -g window-status-bell-style     "fg=yellow,bg=black"

# Right:  tag #S   [user session_attached]
set -g status-right "#[fg=colour8,bg=black] #S #[fg=green,bg=black] #[fg=black,bg=green]󱫋 #{session_attached}#[fg=green,bg=black]"

# Messages & borders
set -g message-style            "fg=yellow,bg=black"
set -g message-command-style    "fg=yellow,bg=black"
set -g pane-border-style        "fg=black"
set -g pane-active-border-style "fg=black"
set -g mode-style               "fg=black,bg=yellow,bold"
setw -g clock-mode-colour       "#88C0D0"
setw -g clock-mode-style        24

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'

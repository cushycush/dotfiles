# Prefix
set -g prefix C-f
set -g prefix2 C-b
bind C-f send-prefix

# Set default shell
set -g default-shell /usr/bin/fish
set -g default-command /usr/bin/fish

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-S-h resize-pane -L 5
bind -n C-S-j resize-pane -D 5
bind -n C-S-k resize-pane -U 5
bind -n C-S-l resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'


# Theme
set -g @ox_bg "#161616"
set -g @ox_fg "#dde1e6"
set -g @ox_muted "#525252"
set -g @ox_subtle "#393939"
set -g @ox_blue "#33b1ff"
set -g @ox_cyan "#3ddbd9"
set -g @ox_magenta "#ee5396"
set -g @ox_green "#42be65"
set -g @ox_yellow "#82cfff"

set -g status-style "bg=#{@ox_bg},fg=#{@ox_fg}"
set -g status-left "#[fg=#{@ox_bg},bg=#{@ox_blue},bold]  #S #[fg=#{@ox_blue},bg=#{@ox_bg}] "
set -g status-right "#[fg=#{@ox_magenta},bold]#{?client_prefix,󰠠 PREFIX ,}#[fg=#{@ox_muted}] %I:%M %p #[fg=#{@ox_subtle}]│#[fg=#{@ox_muted}] %b %d #[fg=#{@ox_subtle}]│#[fg=#{@ox_muted}] 󰒋 #h "

set -g window-status-separator ""
set -g window-status-format "#[fg=#{@ox_muted}] #I:#W#{?window_zoomed_flag, 󰊓,} "
set -g window-status-current-format "#[fg=#{@ox_bg},bg=#{@ox_subtle}]#[fg=#{@ox_blue},bg=#{@ox_subtle},bold] #I:#W#{?window_zoomed_flag, 󰊓,} #[fg=#{@ox_subtle},bg=#{@ox_bg}]"

set -g pane-border-style "fg=#{@ox_subtle}"
set -g pane-active-border-style "fg=#{@ox_blue}"
set -g message-style "bg=#{@ox_bg},fg=#{@ox_blue}"
set -g message-command-style "bg=#{@ox_bg},fg=#{@ox_blue}"
set -g mode-style "bg=#{@ox_blue},fg=#{@ox_bg}"
setw -g clock-mode-colour "colour032"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'

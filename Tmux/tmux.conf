# Prefix
set -g prefix C-f
set -g prefix2 C-b
bind C-f send-prefix

# Set default shell
set -g default-shell /usr/bin/fish
set -g default-command /usr/bin/fish

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Theme (Nordic)
set -g @nord_bg "#191D24"
set -g @nord_fg "#D8DEE9"
set -g @nord_muted "#4C566A"
set -g @nord_subtle "#3B4252"
set -g @nord_blue "#81A1C1"
set -g @nord_cyan "#8FBCBB"
set -g @nord_magenta "#B48EAD"
set -g @nord_green "#A3BE8C"
set -g @nord_yellow "#EBCB8B"

set -g status-style "bg=#{@nord_bg},fg=#{@nord_fg}"
set -g status-left "#[fg=#{@nord_blue},bg=#{@nord_bg}]#[fg=#{@nord_bg},bg=#{@nord_blue},bold]  #{session_windows} #[fg=#{@nord_blue},bg=#{@nord_bg}] "
set -g status-right "#{?client_prefix,#[fg=#{@nord_magenta}#,bold] PREFIX ,}#[fg=#{@nord_muted}]#S #[fg=#{@nord_cyan},bg=#{@nord_bg}]#[fg=#{@nord_bg},bg=#{@nord_cyan},bold]  #I #[fg=#{@nord_cyan},bg=#{@nord_bg}] "

set -g window-status-separator ""
set -g window-status-format "#[fg=#{@nord_muted}] ○ #W "
set -g window-status-current-format "#[fg=#{@nord_cyan},bold] ● #W "

set -g pane-border-style "fg=#{@nord_subtle}"
set -g pane-active-border-style "fg=#{@nord_blue}"
set -g message-style "bg=#{@nord_bg},fg=#{@nord_blue}"
set -g message-command-style "bg=#{@nord_bg},fg=#{@nord_blue}"
set -g mode-style "bg=#{@nord_blue},fg=#{@nord_bg}"
setw -g clock-mode-colour "colour032"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'

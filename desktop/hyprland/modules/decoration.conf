####################
#### DECORATION ####
####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 7
    gaps_out = 15

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(665c54)
    col.inactive_border = rgb(282828)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 16

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgb(282828)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    # Blur disabled — no transparent surfaces in current setup, so the
    # 4-pass Gaussian was full-screen GPU work for nothing. The rest of the
    # parameters are kept so flipping enabled back to true is a one-line
    # change.
    blur {
        enabled = false
        size = 1
        passes = 4
        ignore_opacity = true
        noise = 0.08
        contrast = 1.5
        xray = false
        new_optimizations = true
        vibrancy = 0.1696
    }
}

cursor {
  no_warps = true
  # Hardware cursor plane was thrashing between two KMS buffers (~30Hz),
  # bleeding ~30% CPU on Hyprland's main thread. Software cursors are
  # the documented workaround.
  no_hardware_cursors = true
}

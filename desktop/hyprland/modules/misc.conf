################
##### MISC #####
################

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    # Wallpaper: awww-daemon handles it. Both flags below are required to
    # fully skip Hyprland's built-in BGTex rendering, which is the path that
    # triggers the 0.55 color-management bug (see render{} block below).
    # force_default_wallpaper alone is not enough; disable_hyprland_logo gates
    # the BGTex creation in CRenderer (Renderer.cpp checks
    # misc:disable_hyprland_logo before calling getBackground/getConvertedColor).
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true

    # VRR / Adaptive Sync. Requires FreeSync = On in the monitor OSD.
    # 0 = off, 1 = always on, 2 = fullscreen-only (desktop locked, games swing)
    # Forced to 0 on the Intel iGPU while the Hyprland 0.55 async page-flip
    # path is still flaky. Revisit once that's fixed upstream.
    vrr = 0
}

# Hyprland 0.55's color management (wp_color_manager_v1) is broken on this
# box. The compositor starts, advertises the color protocol, then can't
# build an image description for the output. Every present after that hits
# "Cannot commit when a page-flip is awaiting" and nothing reaches the
# panel (silent black screen). Exact journal signature:
#   ERR ]: getConvertedColor: failed to get image description
#   WARN ]: FIXME: color management protocol is enabled and outputs changed
# Originally blamed on Nvidia, but reproduced 1:1 on the Intel UHD 770
# after the iGPU swap. It's a Hyprland 0.55 regression in
# Render::IHyprRenderer::getConvertedColor, not a driver issue.
#
# Update 2026-05-11 attempt 2: cm_enabled = false alone is NOT sufficient.
# The BGTex (built-in splash/logo) render path calls getConvertedColor
# unconditionally and the error still fires, leaving the display wedged.
# The real kill switch is misc:disable_hyprland_logo = true (above), which
# skips BGTex creation entirely. Keep cm_enabled = false too for belt and
# braces. Re-enable both once Hyprland ships a fix.
render {
    cm_enabled = false
}

# Keep logs while bringing up the Intel iGPU path. Without this, Aquamarine
# output / DRM probing messages don't reach the journal or ~/.cache/hyprland/
# *.log, which means the next black-screen is undiagnosable. Turn these off
# once the new GPU config is verified stable.
debug {
    disable_logs = false
    enable_stdout_logs = true
}


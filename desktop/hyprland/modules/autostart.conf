#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# kmonad runs as a user systemd service (kmonad.service) so it auto-restarts on keyboard replug
exec-once = awww-daemon && awww img ~/media/wallpapers/boat-painting.jpg
exec-once = quickshell -p ~/dotfiles/desktop/quickshell/bar/shell.qml
exec-once = quickshell -p ~/dotfiles/desktop/quickshell/notifications/shell.qml
exec-once = quickshell -p ~/dotfiles/desktop/quickshell/settings/shell.qml
# exec-once = ~/.config/waybar/scripts/launch.sh

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

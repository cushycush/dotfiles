#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Intel iGPU is the primary compositor device. VA-API uses the iHD driver.
# Nvidia GTX 980 stays in the box for render offload via the nvidia-run wrapper,
# which sets __NV_PRIME_RENDER_OFFLOAD / __GLX_VENDOR_LIBRARY_NAME per process
# (independent of AQ_DRM_DEVICES, which only controls the compositor's backend).
#
# Aquamarine splits AQ_DRM_DEVICES on ':' with no escape, so /dev/dri/by-path/
# symlinks are unusable: the PCI BDF (e.g. 0000:00:02.0) gets shredded into
# fragments and Hyprland fails with "Found no gpus to use" on every login.
# Use the cardN node directly. Today: Intel = card1, Nvidia = card0, because
# the initramfs loads the nvidia modules before i915 (see /etc/mkinitcpio.conf
# MODULES=). If that order ever changes the numbers flip, so re-check after
# touching mkinitcpio or removing nvidia drivers.
env = AQ_DRM_DEVICES,/dev/dri/card1
env = LIBVA_DRIVER_NAME,iHD
# AQ_NO_ATOMIC=1 is load-bearing on 0.55 + i915. The kernel cmdline fix
# (nvidia_drm.fbdev=1 removed) was necessary but not sufficient; the
# implicit-pre-apply double-modeset in Hyprland 0.55 still trips the
# page-flip-awaiting check in atomic mode. Legacy mode absorbs it as
# cosmetic errors. Set here as a safety net in case the .lua fails to load.
env = AQ_NO_ATOMIC,1

# Toolkit Backend
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# XDG Specs
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

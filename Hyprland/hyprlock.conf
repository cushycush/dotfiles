$wall = $HOME/media/wallpapers/boat-painting.jpg

# ── Nord palette — matches the Quickshell theme ──────────────────────
$bg         = rgba(36, 41, 51, 0.88)      # #242933 — Polar Night base
$surface    = rgba(46, 52, 64, 0.80)      # #2E3440 — card surface
$text       = rgba(216, 222, 233, 0.95)   # #D8DEE9 — cream
$text_bold  = rgba(236, 239, 244, 1.00)   # #ECEFF4 — snow
$text_dim   = rgba(216, 222, 233, 0.55)
$accent     = rgba(235, 203, 139, 0.90)   # #EBCB8B — aurora yellow
$separator  = rgba(67, 76, 94, 0.70)      # #434C5E
$good       = rgba(163, 190, 140, 0.80)   # #A3BE8C
$alert      = rgba(191, 97, 106, 0.85)    # #BF616A
$font       = MonoLisa Nerd Font

# ── Background ────────────────────────────────────────────────────────
background {
    monitor =
    path = $wall
    blur_passes = 2
    blur_size = 6
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.16
    vibrancy_darkness = 0.05
}

# ── Avatar ────────────────────────────────────────────────────────────
image {
    monitor =
    path = ~/media/wallpapers/avatar.jpg
    border_size = 2
    border_color = $accent
    size = 110
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0, 190
    halign = center
    valign = center
}

# ── Time ──────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $text_bold
    font_size = 68
    font_family = $font
    position = 0, 40
    halign = center
    valign = center
}

# ── Day, Month Day ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = $text_dim
    font_size = 17
    font_family = $font
    position = 0, -30
    halign = center
    valign = center
}

# ── Card behind the login form ────────────────────────────────────────
shape {
    monitor =
    size = 440, 180
    color = $surface
    rounding = 18
    border_size = 1
    border_color = $separator
    rotate = 0
    xray = false
    position = 0, -160
    halign = center
    valign = center
}

# ── $USER label (above the input) ─────────────────────────────────────
label {
    monitor =
    text = $USER
    color = $text
    font_size = 17
    font_family = $font
    position = 0, -120
    halign = center
    valign = center
}

# ── Input field ───────────────────────────────────────────────────────
input-field {
    monitor =
    size = 360, 50
    outline_thickness = 2
    dots_size = 0.26
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1
    outer_color = $accent
    inner_color = $bg
    font_color = $text_bold
    font_family = $font
    check_color = $good
    fail_color = $alert
    fade_on_empty = false
    placeholder_text = <i><span foreground="##D8DEE999">Password</span></i>
    hide_input = false
    position = 0, -185
    halign = center
    valign = center
}

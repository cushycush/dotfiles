stores:
    desktop/hyprland:
        target: /home/cush/.config/hypr
    desktop/quickshell:
        target: /home/cush/.config/quickshell
    desktop/rofi:
        target: /home/cush/.config/rofi/
    desktop/waybar:
        target: /home/cush/.config/waybar
    editors/neovim:
        target: /home/cush/.config/nvim
    fonts/fontconfig:
        target: ~/.config/fontconfig
    kmonad:
        target: /home/cush/.config/kmonad
    shells/fish:
        target: /home/cush/.config/fish/
    shells/nushell:
        target: /home/cush/.config/nushell
    terminals/ghostty:
        target: /home/cush/.config/ghostty
    terminals/tmux:
        target: /home/cush/.config/tmux
    tools/gh:
        target: ~/.config/gh
        files:
            - config.yml
    tools/glow:
        target: ~/.config/glow
    tools/htop:
        target: ~/.config/htop
    tools/lazygit:
        target: ~/.config/lazygit
    tools/mise:
        target: ~/.config/mise
